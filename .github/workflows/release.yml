name: release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

env:
  BINARY_NAME: toolbox

jobs:
  tag:
    name: Create semver tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.next_tag.outputs.tag }}
      version: ${{ steps.next_tag.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next semver tag
        id: next_tag
        shell: bash
        run: |
          set -euo pipefail

          latest_tag="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | head -n 1)"

          if [[ -z "${latest_tag}" ]]; then
            next_tag="v0.1.0"
          elif [[ "${latest_tag}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            major="${BASH_REMATCH[1]}"
            minor="${BASH_REMATCH[2]}"
            patch="${BASH_REMATCH[3]}"
            next_tag="v${major}.${minor}.$((patch + 1))"
          else
            echo "Latest tag '${latest_tag}' is not valid semver (vMAJOR.MINOR.PATCH)." >&2
            exit 1
          fi

          if git rev-parse "${next_tag}" >/dev/null 2>&1; then
            echo "Tag '${next_tag}' already exists." >&2
            exit 1
          fi

          echo "tag=${next_tag}" >>"${GITHUB_OUTPUT}"
          echo "version=${next_tag#v}" >>"${GITHUB_OUTPUT}"

      - name: Create and push tag
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ steps.next_tag.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${tag}" -m "Release ${tag}"
          git push origin "${tag}"

  build:
    name: Build assets
    needs: tag
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.tag }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build release binary
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist
          output="${BINARY_NAME}-${{ matrix.goos }}-${{ matrix.goarch }}"
          GOOS="${{ matrix.goos }}" GOARCH="${{ matrix.goarch }}" CGO_ENABLED=0 \
            go build -trimpath -o "dist/${output}" ./cmd/toolbox

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish release
    needs:
      - tag
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.tag }}
          name: Release ${{ needs.tag.outputs.tag }}
          generate_release_notes: true
          files: dist/*
